name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Lighthouse CI Accessibility Gate
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.deployment.outputs.page_url }}
            ${{ steps.deployment.outputs.page_url }}posts/hello-sertao
            ${{ steps.deployment.outputs.page_url }}posts/practical-guide-building-a-cell-based-architecture-on-aws-with-terraform-and-python-n1p
            ${{ steps.deployment.outputs.page_url }}404
          configPath: ./lighthouserc.json
          uploadArtifacts: true
